{% extends 'core/base.html' %}
{% block content %}
<div style="max-width: 600px; margin: 0 auto; text-align: center;">
    <h2>Confirmar Exclusão</h2>

    <div style="background: linear-gradient(135deg, #2c1810 0%, #1a0f08 100%); color: #f5f5dc; padding: 20px; border-radius: 8px; border: 2px solid #8b0000; margin: 20px 0;">
        <h3 style="color: #ff6b6b; margin-top: 0;">Tem certeza que deseja excluir este chefe?</h3>

        <p style="font-size: 1.1em; margin: 15px 0;"><strong>{{ object.name }}</strong></p>

        {% if object.image_url %}
            <img src="{{ object.image_url }}" alt="{{ object.name }}" style="max-width: 200px; height: 150px; object-fit: cover; border-radius: 5px; margin: 10px 0; border: 2px solid #8b0000;">
        {% endif %}

        <p style="margin: 15px 0;">Esta ação não pode ser desfeita.</p>
    </div>

    <form method="post" style="margin-top: 20px;">
        {% csrf_token %}
        <button type="submit" style="background: #dc3545; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em; margin-right: 10px;">
            Sim, Excluir Chefe
        </button>
        <a href="{% url 'elden-boss-detail' object.pk %}" style="background: #6c757d; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-size: 1.1em;">
            Cancelar
        </a>
    </form>
</div>
{% endblock %}
