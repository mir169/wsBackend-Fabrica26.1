<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EldenRing CRUD Demo</title>
    <style>
        body {font-family: Arial, sans-serif; margin: 20px;}
        nav a {margin-right: 12px; text-decoration:none;}
        table {border-collapse: collapse; width: 100%;}
        table, th, td {border: 1px solid #ccc;}
        th, td {padding: 8px;}
        .error {color: red;}
    </style>
</head>
<body>
<nav>
    <a href="{% url 'home' %}">Início</a>
    <a href="{% url 'guild-list' %}">Guildas</a>
    <a href="{% url 'character-list' %}">Personagens</a>
    <a href="{% url 'eldenring-search' %}">Buscar Elden Ring</a>
    <a href="{% url 'eldenring-characters' %}">Personagens ER</a>
    <a href="{% url 'eldenring-weapons' %}">Armas ER</a>
    <a href="{% url 'eldenring-bosses' %}">Chefes ER</a>
    {% if user.is_authenticated %}
        <a href="{% url 'logout' %}">Logout ({{ user.username }})</a>
    {% else %}
        <a href="{% url 'login' %}">Login</a>
    {% endif %}
</nav>
<hr />
{% block content %}{% endblock %}
</body>
</html>
