{% extends 'core/base.html' %}
{% block content %}
<div style="max-width: 600px; margin: 0 auto; text-align: center;">
    <h2>Confirmar Exclusão</h2>

    <div style="background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 20px; border-radius: 8px; margin: 20px 0;">
        <h3 style="margin-top: 0;">⚠️ Atenção!</h3>
        <p>Tem certeza que deseja excluir o personagem <strong>"{{ object.name }}"</strong>?</p>
        <p style="margin-bottom: 0;">Esta ação não pode ser desfeita.</p>
    </div>

    <form method="post" style="display: inline-block; margin: 20px 0;">
        {% csrf_token %}
        <button type="submit" style="background: #dc3545; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-right: 10px;">
            Sim, excluir "{{ object.name }}"
        </button>
        <a href="{% url 'elden-character-detail' object.pk %}" style="background: #6c757d; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; font-size: 16px;">
            Cancelar
        </a>
    </form>
</div>
{% endblock %}
